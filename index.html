<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>get out — nature field guide</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --bg:#0f0c18;
  --card:#1c1729;
  --gold:#c9a84c;
  --text:#f3eddc;
  --muted:#a9a39a;
  --green:#7aad8a;
  --blue:#7ab8d4;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Josefin Sans',sans-serif;
  background:radial-gradient(circle at top,#1d1630,#0f0c18);
  color:var(--text);
  overflow-x:hidden;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 20px;
}

.hero h1{
  font-family:'Cormorant Garamond';
  font-size:64px;
  font-weight:300;
}

.hero p{
  max-width:650px;
  margin:10px auto;
  color:var(--muted);
  line-height:1.6;
}

/* SEARCH */
.search{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:15px;
}

input{
  padding:12px 16px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  width:260px;
}

button{
  padding:12px 18px;
  border-radius:30px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
}

/* MAP */
#map{
  height:280px;
  max-width:1100px;
  margin:20px auto;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  overflow:hidden;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  margin:25px 0;
}

.tab{
  padding:12px 24px;
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
}

.tab.active{
  background:rgba(122,184,212,0.15);
  color:var(--blue);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  padding:0 20px 60px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#1c1729,#15101f);
  border:1px solid rgba(255,255,255,0.08);
  padding:18px;
  border-radius:16px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

.card h3{font-size:18px}
.latin{color:var(--muted);font-size:12px;font-style:italic}
.desc{margin-top:10px;font-size:13px;line-height:1.5}
.meta{margin-top:10px;font-size:12px;color:var(--gold)}

.banner{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>get out</h1>
  <p>
    A field guide to soothing birdsong and fragrant plants near you.
    Built to get you outside and actually experience nature.
  </p>

  <div class="search">
    <input id="loc" placeholder="Search place (e.g. London)" />
    <button onclick="searchLocation()">Search</button>
    <button onclick="gps()">📍 my location</button>
  </div>
</div>

<div id="map"></div>

<div class="banner" id="banner"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('birds')">🎵 birds</div>
  <div class="tab" onclick="switchTab('plants')">🌿 plants</div>
</div>

<div id="grid" class="grid"></div>

<script>
const GEO_KEY = "pk.20035ccf65b5e38e8e2a1e986fc979f4";

let lat=null, lon=null;
let map, marker;
let current="birds";

const birds=[
{
name:"Blackbird 🐦",
latin:"Turdus merula",
desc:"Rich, fluted dawn song like improvisational jazz.",
sound:"liquid whistles in evening air",
gbif:5789749
},
{
name:"Nightingale 🎶",
latin:"Luscinia megarhynchos",
desc:"One of nature’s most complex night songs.",
sound:"explosive trills in darkness",
gbif:2492321
}
];

const plants=[
{
name:"Lavender 💜",
latin:"Lavandula angustifolia",
desc:"Calming Mediterranean floral scent.",
smell:"dry floral herbal calm",
gbif:3172453
},
{
name:"Honeysuckle 🌸",
latin:"Lonicera periclymenum",
desc:"Intense evening fragrance in hedgerows.",
smell:"sweet nectar-like dusk scent",
gbif:3172678
}
];

function initMap(){
map = L.map('map').setView([51.5072,-0.1276],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);
}

function updateMap(a,b,label){
if(!map) initMap();

map.setView([a,b],11);

if(marker) marker.remove();

marker=L.marker([a,b]).addTo(map)
.bindPopup(label).openPopup();
}

function switchTab(t){
current=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
render();
}

function render(){
const data=current==="birds"?birds:plants;
const grid=document.getElementById("grid");
grid.innerHTML="";

data.forEach(async item=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${item.name}</h3>
<div class="latin">${item.latin}</div>
<div class="desc">${item.desc}</div>
<div class="meta">${current==="birds"?"🎧 "+item.sound:"🌸 "+item.smell}</div>
`;

grid.appendChild(div);

try{
const r=await fetch(`https://api.gbif.org/v1/occurrence/search?taxonKey=${item.gbif}&limit=0`);
const d=await r.json();

const tag=document.createElement("div");
tag.style.fontSize="11px";
tag.style.marginTop="8px";
tag.style.color="#7aad8a";
tag.innerText = lat ? `${d.count} nearby records` : `${d.count} global records`;

div.appendChild(tag);
}catch(e){}
});
}

async function searchLocation(){
const q=document.getElementById("loc").value;
if(!q)return;

const r=await fetch(`https://us1.locationiq.com/v1/search.php?key=${GEO_KEY}&q=${encodeURIComponent(q)}&format=json`);
const d=await r.json();

lat=parseFloat(d[0].lat);
lon=parseFloat(d[0].lon);

document.getElementById("banner").innerText="Showing nature near "+d[0].display_name;

updateMap(lat,lon,d[0].display_name);
render();
}

function gps(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("banner").innerText="Showing nature near you";

updateMap(lat,lon,"Your location");
render();
});
}

initMap();
render();
</script>

</body>
</html>
