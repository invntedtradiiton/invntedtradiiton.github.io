<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>get out — nature field guide</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#120f1c;
  --card:#1c1729;
  --gold:#c9a84c;
  --text:#f3eddc;
  --muted:#a9a39a;
  --green:#7aad8a;
  --blue:#7ab8d4;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Josefin Sans', sans-serif;
  background: radial-gradient(circle at top,#1d1630,#0f0c18);
  color:var(--text);
  overflow-x:hidden;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 30px;
}
.hero h1{
  font-family:'Cormorant Garamond';
  font-size:64px;
  font-weight:300;
  letter-spacing:1px;
}
.hero p{
  max-width:650px;
  margin:10px auto;
  color:var(--muted);
  font-size:15px;
  line-height:1.6;
}

/* LOCATION */
.search{
  margin:20px auto;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
input{
  padding:12px 16px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  width:260px;
}
button{
  padding:12px 18px;
  border-radius:30px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
}
button:hover{background:rgba(201,168,76,0.1)}

.small{
  font-size:11px;
  color:var(--muted);
  text-align:center;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  margin:30px 0;
}
.tab{
  padding:12px 26px;
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
}
.tab.active{
  background:rgba(122,184,212,0.15);
  color:var(--blue);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  padding:0 20px 60px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#1c1729,#15101f);
  border:1px solid rgba(255,255,255,0.08);
  padding:18px;
  border-radius:16px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,0.2);
}
.card h3{
  font-size:18px;
  margin-bottom:6px;
}
.latin{
  font-style:italic;
  color:var(--muted);
  font-size:12px;
}
.desc{
  margin-top:10px;
  font-size:13px;
  line-height:1.5;
  color:#d7d0c2;
}
.meta{
  margin-top:10px;
  font-size:12px;
  color:var(--gold);
}

/* LOCATION BANNER */
.banner{
  text-align:center;
  margin:10px;
  font-size:13px;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="hero">
  <h1>get out</h1>
  <p>
    A field guide to the most soothing birdsong and most fragrant plants near you.
    Built to get you outside — to hear, smell, and actually experience nature again.
  </p>

  <div class="search">
    <input id="loc" placeholder="Enter a place (e.g. London)" />
    <button onclick="searchLocation()">Search</button>
    <button onclick="gps()">📍 use my location</button>
  </div>

  <div class="small">Powered by GBIF biodiversity data + OpenStreetMap</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('birds')">🎵 birds</div>
  <div class="tab" onclick="switchTab('plants')">🌿 plants</div>
</div>

<div class="banner" id="banner"></div>

<div id="grid" class="grid"></div>

<script>
const GEO_KEY = "pk.20035ccf65b5e38e8e2a1e986fc979f4";

let lat=null, lon=null;
let current="birds";

const birds = [
{
name:"Blackbird 🐦",
latin:"Turdus merula",
desc:"One of the most familiar dawn songs — rich, fluted, improvised like jazz.",
sound:"soft liquid whistles rising into evening air",
gbif:5789749
},
{
name:"Nightingale 🎶",
latin:"Luscinia megarhynchos",
desc:"A legendary night singer — chaotic, beautiful, almost human in complexity.",
sound:"bursting trills and cascading phrases in the dark",
gbif:2492321
},
{
name:"Robin 🟥",
latin:"Erithacus rubecula",
desc:"A winter singer — fragile, emotional, strangely intimate.",
sound:"thin silver notes hanging in cold air",
gbif:2492295
}
];

const plants = [
{
name:"Lavender 💜",
latin:"Lavandula angustifolia",
desc:"Calming Mediterranean scent used for sleep and relaxation.",
smell:"dry floral calm with herbal softness",
gbif:3172453
},
{
name:"Honeysuckle 🌸",
latin:"Lonicera periclymenum",
desc:"One of the strongest evening fragrances in the British countryside.",
smell:"sweet nectar-like scent intensifying at dusk",
gbif:3172678
},
{
name:"Wild Garlic 🌿",
latin:"Allium ursinum",
desc:"Spring woodland smell that takes over entire forests.",
smell:"sharp green garlic burst in damp air",
gbif:2856885
}
];

function switchTab(t){
current=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
render();
}

function render(){
const data = current==="birds"?birds:plants;
const grid = document.getElementById("grid");
grid.innerHTML="";

data.forEach(async item=>{
const div=document.createElement("div");
div.className="card";

let extra = "";

if(current==="birds"){
extra = "🎧 sound: " + item.sound;
} else {
extra = "🌸 scent: " + item.smell;
}

div.innerHTML=`
<h3>${item.name}</h3>
<div class="latin">${item.latin}</div>
<div class="desc">${item.desc}</div>
<div class="meta">${extra}</div>
`;

grid.appendChild(div);

loadGBIF(item.gbif, div);
});
}

async function loadGBIF(key, el){
try{
const r = await fetch(`https://api.gbif.org/v1/occurrence/search?taxonKey=${key}&limit=0`);
const d = await r.json();
const count = d.count || 0;

const tag = document.createElement("div");
tag.style.marginTop="8px";
tag.style.fontSize="11px";
tag.style.color="#7aad8a";
tag.innerText = lat ? `${count} nearby records` : `${count.toLocaleString()} global records`;

el.appendChild(tag);
}catch(e){}
}

async function searchLocation(){
const q = document.getElementById("loc").value;
if(!q) return;

const r = await fetch(`https://us1.locationiq.com/v1/search.php?key=${GEO_KEY}&q=${encodeURIComponent(q)}&format=json`);
const d = await r.json();

lat = d[0].lat;
lon = d[0].lon;

document.getElementById("banner").innerText =
`Showing wildlife near ${d[0].display_name}`;

render();
}

function gps(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("banner").innerText="Showing wildlife near your location";
render();
});
}

render();
</script>

</body>
</html>
