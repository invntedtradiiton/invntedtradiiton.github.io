<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodiversity Explorer (GBIF + Map)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#1a1428;
  color:#f0ead8;
}

header {
  padding:12px;
  text-align:center;
}

input, button {
  padding:10px;
  margin:4px;
}

#layout {
  display:grid;
  grid-template-columns: 1fr 1fr;
  height: calc(100vh - 80px);
}

#map {
  height:100%;
}

#grid {
  overflow:auto;
  padding:10px;
}

.card {
  padding:10px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;
  background:rgba(255,255,255,0.03);
}
</style>
</head>

<body>

<header>
  <h2>GBIF Biodiversity Explorer</h2>
  <input id="loc" placeholder="Search location">
  <button onclick="searchLocation()">Search</button>
  <button onclick="gps()">📍</button>
</header>

<div id="layout">
  <div id="map"></div>
  <div id="grid"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =========================
   API KEY
========================= */
const LOCATIONIQ_KEY = "pk.20035ccf65b5e38e8e2a1e986fc979f4";

/* =========================
   STATE
========================= */
let map;
let lat = 51.5;
let lng = -0.1;

/* A small curated list (expand anytime) */
const SPECIES = [
  "Turdus merula",        // Blackbird
  "Erithacus rubecula",   // Robin
  "Alauda arvensis",      // Skylark
  "Lavandula angustifolia",
  "Rosa canina",
  "Calluna vulgaris"
];

/* =========================
   INIT MAP
========================= */
function initMap(){
  map = L.map('map').setView([lat, lng], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
  }).addTo(map);
}

/* =========================
   RESOLVE GBIF TAXON KEY
========================= */
async function getTaxonKey(name){
  try {
    const res = await fetch(
      `https://api.gbif.org/v1/species/match?name=${encodeURIComponent(name)}`
    );
    const data = await res.json();
    return data.usageKey || null;
  } catch {
    return null;
  }
}

/* =========================
   GET OCCURRENCE POINTS
========================= */
async function getOccurrences(taxonKey){
  try {
    const res = await fetch(
      `https://api.gbif.org/v1/occurrence/search?taxonKey=${taxonKey}&limit=20&decimalLatitude=${lat-1},${lat+1}&decimalLongitude=${lng-1},${lng+1}`
    );
    const data = await res.json();
    return data.results || [];
  } catch {
    return [];
  }
}

/* =========================
   LOAD SPECIES
========================= */
async function load(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  map.eachLayer(layer => {
    if(layer instanceof L.Marker) map.removeLayer(layer);
  });

  for(const name of SPECIES){

    const div = document.createElement("div");
    div.className = "card";
    div.textContent = `Loading ${name}...`;
    grid.appendChild(div);

    const key = await getTaxonKey(name);

    if(!key){
      div.textContent = `${name} — not found in GBIF`;
      continue;
    }

    const occurrences = await getOccurrences(key);

    div.innerHTML = `<b>${name}</b><br>${occurrences.length} local records`;

    occurrences.forEach(o => {
      if(o.decimalLatitude && o.decimalLongitude){
        L.marker([o.decimalLatitude, o.decimalLongitude])
          .addTo(map)
          .bindPopup(name);
      }
    });
  }
}

/* =========================
   SEARCH LOCATION
========================= */
async function searchLocation(){
  const q = document.getElementById("loc").value;

  const res = await fetch(
    `https://us1.locationiq.com/v1/search.php?key=${LOCATIONIQ_KEY}&q=${encodeURIComponent(q)}&format=json`
  );

  const data = await res.json();
  if(!data.length) return alert("Not found");

  lat = parseFloat(data[0].lat);
  lng = parseFloat(data[0].lon);

  map.setView([lat, lng], 10);
  load();
}

/* =========================
   GPS
========================= */
function gps(){
  navigator.geolocation.getCurrentPosition(p=>{
    lat = p.coords.latitude;
    lng = p.coords.longitude;
    map.setView([lat, lng], 10);
    load();
  });
}

/* =========================
   START
========================= */
initMap();
load();

</script>

</body>
</html>
