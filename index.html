<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= API ================= */
const KEY = "pk.20035ccf65b5e38e8e2a1e986fc979f4";

/* ================= STATE ================= */
let lat = 51.5;
let lng = -0.1;
let type = "bird";
let map;
let markers = [];
let cache = {};

/* ================= DATA ================= */
const DATA = {
  bird: [
    { name:"Blackbird", id:5789749 },
    { name:"Robin", id:2492295 },
    { name:"Skylark", id:2491576 }
  ],
  plant: [
    { name:"Lavender", id:3172453 },
    { name:"Rose", id:3032856 },
    { name:"Heather", id:2876946 }
  ]
};

/* ================= MAP INIT ================= */
function initMap(){
  map = L.map('map', {
    zoomControl: true
  }).setView([lat, lng], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
  }).addTo(map);
}

/* ================= FIX CLICK ISSUE (IMPORTANT) ================= */
function fixMapClickBlocking(){
  const mapEl = document.getElementById("map");
  mapEl.style.pointerEvents = "auto";
  mapEl.style.zIndex = "1";
}

/* ================= MARKERS ================= */
function clearMarkers(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

/* ================= LOAD ================= */
async function load(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  clearMarkers();

  for(const item of DATA[type]){

    const key = `${item.id}-${lat.toFixed(2)}-${lng.toFixed(2)}`;

    let count;
    if(cache[key]){
      count = cache[key];
    } else {
      const url =
        `https://api.gbif.org/v1/occurrence/search?taxonKey=${item.id}&limit=0&decimalLatitude=${lat-0.5},${lat+0.5}&decimalLongitude=${lng-0.5},${lng+0.5}`;

      const res = await fetch(url);
      const data = await res.json();
      count = data.count || 0;
      cache[key] = count;
    }

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${item.name}</b><br>${count.toLocaleString()} records`;
    grid.appendChild(div);

    if(count > 0){
      const marker = L.marker([
        lat + (Math.random()-0.5)*0.3,
        lng + (Math.random()-0.5)*0.3
      ])
      .addTo(map)
      .bindPopup(`${item.name}<br>${count} records`);

      markers.push(marker);
    }
  }
}

/* ================= TAB ================= */
window.setType = function(t){
  type = t;
  load();
};

/* ================= LOCATION ================= */
window.search = async function(){
  const q = document.getElementById("loc").value;
  if(!q) return;

  toast("Searching...");

  const res = await fetch(
    `https://us1.locationiq.com/v1/search.php?key=${KEY}&q=${encodeURIComponent(q)}&format=json`
  );

  const data = await res.json();
  if(!data.length) return toast("Not found");

  lat = parseFloat(data[0].lat);
  lng = parseFloat(data[0].lon);

  map.setView([lat, lng], 10);
  load();
};

window.gps = function(){
  navigator.geolocation.getCurrentPosition(async p=>{
    lat = p.coords.latitude;
    lng = p.coords.longitude;
    map.setView([lat, lng], 10);
    load();
  });
};

/* ================= TOAST ================= */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* ================= START ================= */
initMap();
fixMapClickBlocking();
load();

});
</script>
