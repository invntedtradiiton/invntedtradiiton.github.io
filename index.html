<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Out Into Nearest Nature</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --bg:#0f0c1a;
  --panel:#17122a;
  --text:#f3eddc;
  --muted:rgba(243,237,220,0.65);
  --accent:#c9a84c;
  --green:#7aad8a;
  --blue:#7ab8d4;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:32px 20px 18px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:34px;
  font-weight:600;
  margin:0 0 10px;
  letter-spacing:-0.5px;
}

.subtitle{
  font-size:15px;
  line-height:1.6;
  color:var(--muted);
  max-width:700px;
}

/* LAYOUT */
#layout{
  display:grid;
  grid-template-columns: 1fr 1fr;
  height: calc(100vh - 140px);
  gap:10px;
  padding:10px;
}

/* MAP */
#map{
  border-radius:16px;
  overflow:hidden;
}

/* LIST */
#grid{
  overflow:auto;
  padding:10px;
}

/* CARD */
.card{
  background:var(--panel);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  transition:0.2s ease;
}

.card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,0.12);
}

.title{
  font-size:16px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}

.latin{
  font-size:12px;
  opacity:0.5;
  margin-top:2px;
}

.meta{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
  line-height:1.4;
}

.tag{
  display:inline-block;
  font-size:11px;
  padding:3px 8px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  margin-top:8px;
}

/* AUDIO */
audio{
  width:100%;
  margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
  #layout{
    grid-template-columns:1fr;
    height:auto;
  }
  #map{
    height:300px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Get Out Into Nearest Nature</h1>
  <div class="subtitle">
    This is a field guide designed to pull you outside — toward the most soothing birdsong and the most fragrant wild flowers near you.
    Real species from GBIF. Real recordings. Real places waiting to be explored.
  </div>
</header>

<div id="layout">
  <div id="map"></div>
  <div id="grid"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let lat = 51.5;
let lng = -0.1;

/* =========================
   CURATED SPECIES
========================= */
const SPECIES = [
  {
    name:"🐦 Blackbird",
    latin:"Turdus merula",
    scent:null,
    sound:true,
    note:"Rich, flute-like dawn song — one of the most calming urban sounds in Britain."
  },
  {
    name:"🐦 Robin",
    latin:"Erithacus rubecula",
    scent:null,
    sound:true,
    note:"Soft, wistful song that carries through gardens even in winter."
  },
  {
    name:"🎵 Skylark",
    latin:"Alauda arvensis",
    scent:null,
    sound:true,
    note:"Continuous rising song high above open fields — pure openness in sound."
  },
  {
    name:"🌙 Nightingale",
    latin:"Luscinia megarhynchos",
    scent:null,
    sound:true,
    note:"Legendary night song — dense, emotional, and deeply immersive."
  },
  {
    name:"🪻 Lavender",
    latin:"Lavandula angustifolia",
    scent:"Clean, calming, herbal fragrance that relaxes the nervous system.",
    sound:false
  },
  {
    name:"🌹 Dog Rose",
    latin:"Rosa canina",
    scent:"Light wild rose scent — subtle, best discovered in hedgerows at close range.",
    sound:false
  },
  {
    name:"🌸 Honeysuckle",
    latin:"Lonicera periclymenum",
    scent:"Sweet, heady evening fragrance that intensifies at dusk.",
    sound:false
  }
];

/* =========================
   MAP INIT
========================= */
function initMap(){
  map = L.map('map').setView([lat,lng],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);
}

/* =========================
   GBIF
========================= */
async function getKey(name){
  const r = await fetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(name)}`);
  const d = await r.json();
  return d.usageKey;
}

async function getOcc(key){
  const r = await fetch(
    `https://api.gbif.org/v1/occurrence/search?taxonKey=${key}&limit=12&decimalLatitude=${lat-1},${lat+1}&decimalLongitude=${lng-1},${lng+1}`
  );
  const d = await r.json();
  return d.results || [];
}

/* =========================
   AUDIO (XENO-CANTO)
========================= */
async function getAudio(latin){
  try{
    const r = await fetch(`https://xeno-canto.org/api/2/recordings?query=${latin}`);
    const d = await r.json();
    return d.recordings?.[0]?.file || null;
  } catch {
    return null;
  }
}

/* =========================
   LOAD UI
========================= */
async function load(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  map.eachLayer(l=>{
    if(l instanceof L.Marker) map.removeLayer(l);
  });

  for(const s of SPECIES){

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${s.name}</div>
      <div class="latin">${s.latin}</div>
      <div class="meta">${s.note || ""}</div>
      <div class="meta">${s.scent ? "🌸 " + s.scent : "🎧 Loading soundscape..."}</div>
      <div class="meta">Loading nearby nature data…</div>
    `;

    grid.appendChild(card);

    const key = await getKey(s.latin);
    if(!key){
      card.querySelectorAll(".meta")[1].textContent = "Not found in GBIF";
      continue;
    }

    const occ = await getOcc(key);

    card.querySelectorAll(".meta")[1].textContent =
      `${occ.length} nearby records`;

    occ.forEach(o=>{
      if(o.decimalLatitude && o.decimalLongitude){
        L.marker([o.decimalLatitude,o.decimalLongitude])
          .addTo(map)
          .bindPopup(s.name);
      }
    });

    if(s.sound){

      const audioUrl = await getAudio(s.latin);

      if(audioUrl){
        const a = document.createElement("audio");
        a.controls = true;
        a.src = audioUrl;
        card.appendChild(a);
      } else {
        const m = document.createElement("div");
        m.className="meta";
        m.textContent="No recording found";
        card.appendChild(m);
      }
    }
  }
}

/* =========================
   START
========================= */
initMap();
load();

</script>

</body>
</html>
