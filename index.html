<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>get out — nature field guide</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#120f1c;
  --card:#1c1729;
  --gold:#c9a84c;
  --text:#f3eddc;
  --muted:#a9a39a;
  --green:#7aad8a;
  --blue:#7ab8d4;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Josefin Sans', sans-serif;
  background: radial-gradient(circle at top,#1d1630,#0f0c18);
  color:var(--text);
  overflow-x:hidden;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 30px;
}
.hero h1{
  font-family:'Cormorant Garamond';
  font-size:64px;
  font-weight:300;
}
.hero p{
  max-width:650px;
  margin:10px auto;
  color:var(--muted);
  font-size:15px;
  line-height:1.6;
}

/* SEARCH */
.search{
  margin:20px auto;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
input{
  padding:12px 16px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  width:260px;
}
button{
  padding:12px 18px;
  border-radius:30px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  margin:30px 0;
}
.tab{
  padding:12px 26px;
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
}
.tab.active{
  background:rgba(122,184,212,0.15);
  color:var(--blue);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  padding:0 20px 60px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#1c1729,#15101f);
  border:1px solid rgba(255,255,255,0.08);
  padding:18px;
  border-radius:16px;
}
.card h3{font-size:18px}
.latin{font-style:italic;color:var(--muted);font-size:12px}
.desc{margin-top:10px;font-size:13px}
.meta{margin-top:10px;font-size:12px;color:var(--gold)}

.banner{
  text-align:center;
  margin:10px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="hero">
  <h1>get out</h1>
  <p>
    A field guide to birds and plants near you in the UK.
    Built from real biodiversity data — not guesses.
  </p>

  <div class="search">
    <input id="loc" placeholder="Enter a place (e.g. London)" />
    <button onclick="searchLocation()">Search</button>
    <button onclick="gps()">📍 use my location</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('birds', event)">🎵 birds</div>
  <div class="tab" onclick="switchTab('plants', event)">🌿 plants</div>
</div>

<div class="banner" id="banner"></div>
<div id="grid" class="grid"></div>

<script>
let lat=null, lon=null;
let current="birds";

const cache = {};

const birds = [
"Blackbird",
"Nightingale",
"Robin"
];

const plants = [
"Lavandula angustifolia",
"Lonicera periclymenum",
"Allium ursinum"
];

/* TAB SWITCH */
function switchTab(t, e){
current=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
e.target.classList.add("active");
render();
}

/* MAIN RENDER */
function render(){
const data = current==="birds"?birds:plants;
const grid = document.getElementById("grid");
grid.innerHTML="";

data.forEach(name=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${name}</h3>
<div class="meta">loading biodiversity data...</div>
`;

grid.appendChild(div);

loadGBIF(name, div);
});
}

/* GBIF + UK OCCURRENCE FIX */
async function loadGBIF(name, el){
try{

if(cache[name]){
return renderCard(el, cache[name]);
}

/* 1. resolve species */
const match = await fetch(
`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(name)}`
);
const m = await match.json();

const key = m.usageKey;
if(!key){
renderCard(el, {count:0});
return;
}

/* 2. UK-focused bounding */
let url = `https://api.gbif.org/v1/occurrence/search?taxonKey=${key}&limit=0`;

if(lat && lon){
const d = 0.5;
url += `&decimalLatitude=${lat-d},${lat+d}&decimalLongitude=${lon-d},${lon+d}`;
}

const r = await fetch(url);
const d = await r.json();

const result = {
count: d.count || 0,
scientific: m.scientificName || name
};

cache[name]=result;
renderCard(el, result);

}catch(e){
console.log(e);
}
}

/* CARD UPDATE */
function renderCard(el, data){
el.querySelector(".meta").innerHTML =
lat
? `📍 ${data.count} nearby UK records`
: `🌍 ${data.count.toLocaleString()} global records`;
}

/* LOCATION SEARCH */
async function searchLocation(){
const q=document.getElementById("loc").value;
if(!q) return;

const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
const d=await r.json();

lat=parseFloat(d[0].lat);
lon=parseFloat(d[0].lon);

document.getElementById("banner").innerText=
`Showing UK wildlife near ${d[0].display_name}`;

render();
}

/* GPS */
function gps(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("banner").innerText=
"Showing wildlife near your location";

render();
});
}

render();
</script>

</body>
</html>
